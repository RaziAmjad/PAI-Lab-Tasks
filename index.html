<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>😂 Random Joke Generator</h1>
        <div class="joke-box">
            <p id="setup">Click the button to get a joke!</p>
            <p id="punchline"></p>
        </div>
        <button id="jokeBtn">Get Random Joke</button>
    </div>

    <script>
        const jokeBtn = document.getElementById('jokeBtn');
        const setupEl = document.getElementById('setup');
        const punchlineEl = document.getElementById('punchline');

        jokeBtn.addEventListener('click', async () => {
            setupEl.textContent = "Loading...";
            punchlineEl.textContent = "";
            try {
                const res = await fetch('/joke');
                const data = await res.json();
                setupEl.textContent = data.setup;
                punchlineEl.textContent = data.punchline;
            } catch (err) {
                setupEl.textContent = "Oops! Something went wrong.";
            }
        });
    </script>
</body>
</html>
